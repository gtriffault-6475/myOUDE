spring:
  application:
    name: oude-backend
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}/${DB_NAME:oude_db}
    username: ${DB_USER:oude_dev}
    password: ${DB_PASSWORD:dev_only}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  security:
    oauth2:
      resourceserver:
        jwt:
          # TODO: AQ-1 — JWKS_URI : remplacer par l'URL réelle de l'IdP Renault
          # Ex: https://sso.renault.com/.well-known/jwks.json
          jwks-uri: ${SSO_JWKS_URI:http://localhost:9090/jwks}
          # TODO: AQ-1 : issuer à confirmer avec l'équipe sécurité Renault
          issuer-uri: ${SSO_ISSUER_URI:http://localhost:9090}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

oude:
  country-code: ${OUDE_COUNTRY_CODE:fr}
  cache:
    portfolio-ttl-hours: ${OUDE_CACHE_TTL_HOURS:1}

renault:
  api:
    leads-url: ${RENAULT_API_LEADS_URL:stub}      # TODO: AQ-2 — URL Apigee X leads
    affaires-url: ${RENAULT_API_AFFAIRES_URL:stub} # TODO: AQ-3 — URL Apigee X affaires

resilience4j:
  retry:
    instances:
      renaultApi:
        max-attempts: 2
        wait-duration: 500ms
        retry-exceptions:
          - java.io.IOException
          - org.springframework.web.client.ResourceAccessException

logging:
  config: classpath:logback-spring.xml
