# Profil test — H2 en mémoire, JwtDecoder mocké (pas de PostgreSQL ni d'IdP requis)
spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: none
  flyway:
    enabled: true
    locations: classpath:db/migration
  security:
    oauth2:
      resourceserver:
        jwt:
          # Valeur bidon — le JwtDecoder est mocké dans les tests @SpringBootTest
          jwks-uri: http://localhost:9090/jwks
          issuer-uri: http://localhost:9090

renault:
  api:
    leads-url: stub
    affaires-url: stub

resilience4j:
  retry:
    instances:
      renaultApi:
        max-attempts: 1
        wait-duration: 0ms
